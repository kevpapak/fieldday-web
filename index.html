document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    const templateData = JSON.parse(templateEl.textContent);
    const pages = templateData.pages;
    const entryId = templateData.entry;
    const pageIds = Object.keys(pages);

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : {};

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    // Per-page prep: substitute UUIDs, strip SRI/crossorigin (blob URLs from a
    // file:// document inherit a null origin, so crossorigin forces a CORS
    // fetch that SRI then rejects — the manifest bytes are ours; SRI protects
    // against CDN compromise, not this), and inject the page's own
    // window.__resources + the click interceptor into <head>. slice() rather
    // than replace() keeps us clear of $-pattern substitution.
    function resourcesFor(id) {
      var map = {};
      var list = extResources[id] || [];
      for (var k = 0; k < list.length; k++) {
        if (blobUrls[list[k].uuid]) map[list[k].id] = blobUrls[list[k].uuid];
      }
      return map;
    }
    for (const id of pageIds) {
      let t = pages[id];
      for (const uuid of uuids) t = t.split(uuid).join(blobUrls[uuid]);
      t = t.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');
      // The click interceptor owns every anchor click (not a <base target>):
      // a blanket <base target="_parent"> would also redirect form submissions
      // and tear down the wrapper. Non-# links navigate the parent to the
      // anchor's resolved href; #/… routes forward to the parent's hash only
      // when the id is one of this bundle's own pages (author #/… links from
      // an in-page hash router are left to the scroll path so they don't yank
      // the user to the entry page); plain #frag scrolls in place.
      // composedPath + getAttribute('target') handle SVG <a> and shadow-DOM
      // anchors, which closest()/IDL .target get wrong.
      var headContent = 'window.__resources = ' + JSON.stringify(resourcesFor(id)) + ';' +
        (pageIds.length > 1 ?
          'window.__bundler_pages = ' + JSON.stringify(pageIds) + ';' +
          'document.addEventListener("click", function(e){' +
            'if (e.button !== 0 || e.metaKey || e.ctrlKey || e.shiftKey || e.altKey || e.defaultPrevented) return;' +
            'var a = null, p = e.composedPath ? e.composedPath() : [e.target];' +
            'for (var j = 0; j < p.length && !a; j++) {' +
              'var n = p[j], tn = n && n.tagName;' +
              'if (tn === "A" || tn === "a" || tn === "AREA") a = n;' +
            '}' +
            'if (!a && e.target.closest) a = e.target.closest("a, area");' +
            'if (!a || a.hasAttribute("download")) return;' +
            'var tg = a.getAttribute("target");' +
            'if (tg && tg !== "_self") return;' +
            'var h = a.getAttribute("href") || a.getAttribute("xlink:href");' +
            'if (!h || /^javascript:/i.test(h)) return;' +
            'if (h.charAt(0) !== "#") {' +
              'if (!tg) { var b = document.querySelector("base[target]"); if (b && b.getAttribute("target") !== "_self") return; }' +
              'e.preventDefault();' +
              'if (/^(?:[a-z][a-z0-9+.-]*:|\\/\\/)/i.test(h)) parent.location.assign(h);' +
              'return;' +
            '}' +
            'e.preventDefault();' +
            'if (h.slice(0, 2) === "#/") {' +
              'var c = h.indexOf(":", 2);' +
              'var pid = c < 0 ? h.slice(2) : h.slice(2, c);' +
              'try { pid = decodeURIComponent(pid); } catch(err) {}' +
              'if (window.__bundler_pages.indexOf(pid) >= 0) { parent.location.hash = h; return; }' +
            '}' +
            'var t = h.length > 1 ? document.getElementById(h.slice(1)) : null;' +
            'if (t) t.scrollIntoView({behavior:"smooth"});' +
            'else scrollTo({top:0, behavior:"smooth"});' +
          '});' : '');
      // Defuse any script end-tag sequence in the content (resource ids, page
      // ids) before wrapping — same escape level as every sibling JSON island.
      var headScript = '<script>' +
        headContent.split('</' + 'script').join('<\\/' + 'script') +
        '</' + 'script>';
      // Inject after <head> so the DOCTYPE stays first; prepending the script
      // would push the parser into quirks mode. DOMParser always emits a <head>
      // (synthesizing one if the source HTML omitted it) but may carry
      // attributes through, so match the full opening tag.
      var headOpen = t.match(/<head[^>]*>/i);
      if (headOpen) {
        var hi = headOpen.index + headOpen[0].length;
        t = t.slice(0, hi) + headScript + t.slice(hi);
      }
      pages[id] = t;
    }

    setStatus('Rendering...');

    if (pageIds.length === 1) {
      // Single page: the pre-crawl render path. Parse the template and swap the
      // root element. Scripts inserted via DOMParser/replaceWith are inert per
      // spec — re-create each with createElement so they execute, awaiting
      // onload for src scripts to preserve ordering (React before ReactDOM
      // before Babel before text/babel).
      var template = pages[entryId];
      const doc = new DOMParser().parseFromString(template, 'text/html');
      document.documentElement.replaceWith(doc.documentElement);
      const dead = Array.from(document.scripts);
      for (const old of dead) {
        const s = document.createElement('script');
        for (const a of old.attributes) s.setAttribute(a.name, a.value);
        s.textContent = old.textContent;
        // text/babel scripts with a src: fetch and inline. transformScriptTags
        // does XHR against the src, but blob:null/ from a file:// origin is
        // silently dropped. Inlining makes it a plain inline babel script,
        // which transformScriptTags handles unconditionally.
        if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
          try {
            const r = await fetch(s.src);
            s.textContent = await r.text();
            s.removeAttribute('src');
          } catch (e) {}
        }
        // Non-executable script types (text/babel, application/json, …) are
        // data blocks per spec: the browser never fetches src and never fires
        // load/error, so awaiting would hang forever.
        const exec = !s.type || s.type === 'module' || /(java|ecma)script/i.test(s.type);
        const p = (s.src && exec) ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
        old.replaceWith(s);
        if (p) await p;
      }
      // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
      // which fired before we swapped the document. Trigger manually if present.
      if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
        window.Babel.transformScriptTags();
      }
      return;
    }

    // Multi-page: render into a full-viewport srcdoc iframe so each page runs
    // in its own realm while staying same-origin with the parent (so asset
    // blob URLs load and parent.location is writable).
    var frame = document.createElement('iframe');
    frame.id = '__bundler_frame';
    frame.setAttribute('style', 'position:fixed;inset:0;width:100%;height:100%;border:0;background:#fff');
    document.body.appendChild(frame);

    function decode(s) {
      try { return decodeURIComponent(s); } catch (e) { return s; }
    }
    function route() {
      var h = (location.hash || '');
      if (h.slice(0, 2) !== '#/') return { id: entryId, anchor: '' };
      h = h.slice(2);
      var i = h.indexOf(':');
      return i < 0 ? { id: decode(h), anchor: '' }
                   : { id: decode(h.slice(0, i)), anchor: decode(h.slice(i + 1)) };
    }

    var current = null;
    var navGen = 0;
    function navigate() {
      var r = route();
      var id = Object.prototype.hasOwnProperty.call(pages, r.id) ? r.id : entryId;
      if (current === id) {
        // Same-page anchor change: the iframe's own hash handles this, so
        // normally we don't reach here. If we do (e.g. a programmatic
        // parent.location.hash change), nudge the iframe.
        var cw = frame.contentWindow;
        if (!cw) return;
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView({ behavior: 'smooth' });
        else cw.scrollTo({ top: 0, behavior: 'smooth' });
        return;
      }
      current = id;
      var gen = ++navGen;
      frame.onload = function() {
        // One-shot: an iframe-internal navigation (form submit, page JS
        // location.href=) re-fires onload with the same gen; after that the
        // iframe may be cross-origin, and cw.* access would throw.
        frame.onload = null;
        if (gen !== navGen) return;
        var cw = frame.contentWindow;
        try { cw.document.title && (document.title = cw.document.title); } catch (e) {}
        var splash = document.getElementById('__bundler_thumbnail') ||
                     document.getElementById('__bundler_placeholder');
        if (splash) splash.remove();
        if (loading) loading.remove();
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView();
        else cw.scrollTo(0, 0);
      };
      frame.srcdoc = pages[id];
    }

    window.addEventListener('hashchange', navigate);
    navigate();
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 <button onclick=\"{{ submit }}\" style=\"font-family:inherit;font-size:.92rem;font-weight:600;color:#0A2747;background:linear-gradient(135deg,#F4C44E,#E3B23C);padding:1rem 2.1rem;border-radius:100px;border:none;cursor:pointer;box-shadow:0 12px 30px rgba(227,178,60,.32);transition:transform .15s,box-shadow .2s;\" style-hover=\"transform:translateY(-2px);box-shadow:0 18px 38px rgba(227,178,60,.45);\">Notify me<\/button>\n      <\/div>\n      <sc-if value=\"{{ submitted }}\" hint-placeholder-val=\"{{ false }}\">\n        <p style=\"font-size:.9rem;color:#E3B23C;margin-top:1.2rem;font-weight:500;\">You're on the list — see you on the field. 🤙<\/p>\n      <\/sc-if>\n    <\/div>\n  <\/section>\n\n  <!-- ============ FOOTER ============ -->\n  <footer style=\"padding:2rem clamp(1.25rem,4vw,3rem);display:flex;align-items:center;justify-content:space-between;border-top:1px solid rgba(0,129,167,.16);flex-wrap:wrap;gap:1rem;\">\n    <a href=\"#top\" style=\"display:inline-flex;align-items:center;gap:8px;text-decoration:none;\">\n      <svg width=\"19\" height=\"19\" viewBox=\"0 0 100 100\" xmlns=\"http:\/\/www.w3.org\/2000\/svg\"><path d=\"M50,9 L21,63 L50,93 L79,63 Z\" fill=\"#E3B23C\"><\/path><circle cx=\"50\" cy=\"63\" r=\"13\" fill=\"#0A2747\"><\/circle><\/svg>\n      <span style=\"font-weight:700;letter-spacing:-.01em;font-size:1.15rem;\"><span style=\"color:#fff;\">Field<\/span><span style=\"color:#E3B23C;\">day<\/span><\/span>\n    <\/a>\n    <p style=\"font-size:.76rem;color:#4A7A99;\">© 2026 Fieldday · Austin, TX · Find your game.<\/p>\n  <\/footer>\n\n<\/div>\n<\/x-dc>\n<script type=\"text\/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:900},&quot;playIntro&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;}}\">\nclass Component extends DCLogic {\n  state = { submitted: false };\n\n  renderVals() {\n    return {\n      submitted: this.state.submitted,\n      submit: async () => {\n        const el = document.getElementById('fd-email');\n        const v = (el && el.value || '').trim();\n        if (!this.isValidEmail(v)) { if (el) el.focus(); return; }\n        try {\n          await this.saveLaunchSignup(v);\n          if (el) el.value = '';\n          this.setState({ submitted: true });\n        } catch (err) {\n          console.error('Fieldday launch signup failed:', err);\n          alert('Sorry, we could not save your email just now. Please try again.');\n        }\n      },\n      skip: () => this.skipIntro(),\n    };\n  }\n  firebaseConfig() {\n    const externalConfig = window.FIELDDAY_FIREBASE_CONFIG;\n    if (externalConfig && externalConfig.apiKey) return externalConfig;\n    return {\n      apiKey: 'PASTE_FIREBASE_API_KEY',\n      authDomain: 'PASTE_FIREBASE_AUTH_DOMAIN',\n      projectId: 'PASTE_FIREBASE_PROJECT_ID',\n      storageBucket: 'PASTE_FIREBASE_STORAGE_BUCKET',\n      messagingSenderId: 'PASTE_FIREBASE_MESSAGING_SENDER_ID',\n      appId: 'PASTE_FIREBASE_APP_ID',\n    };\n  }\n\n\n\n  isValidEmail(email) {\n    return \/^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$\/.test(email);\n  }\n\n  async saveLaunchSignup(email) {\n    const config = this.firebaseConfig();\n    if (!config.apiKey || config.apiKey.indexOf('PASTE_') === 0) {\n      throw new Error('Firebase config has not been filled in yet.');\n    }\n\n    if (!this._firebaseDb) {\n      const appMod = await import('https:\/\/www.gstatic.com\/firebasejs\/10.12.5\/firebase-app.js');\n      const firestoreMod = await import('https:\/\/www.gstatic.com\/firebasejs\/10.12.5\/firebase-firestore.js');\n      this._firestore = firestoreMod;\n      this._firebaseApp = this._firebaseApp || appMod.initializeApp(config);\n      this._firebaseDb = firestoreMod.getFirestore(this._firebaseApp);\n    }\n\n    await this._firestore.addDoc(\n      this._firestore.collection(this._firebaseDb, 'launchSignups'),\n      {\n        email: email.trim().toLowerCase(),\n        source: 'fieldday-website',\n        page: window.location.href,\n        userAgent: navigator.userAgent,\n        createdAt: this._firestore.serverTimestamp(),\n      }\n    );\n  }\n\n\n  componentDidMount() {    this._reduced = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;\n    this.initNav();\n    if (this.props.playIntro !== false && !this._reduced) {\n      this.runIntro();\n    } else {\n      this.finishIntro(true);\n    }\n  }\n\n  componentWillUnmount() {\n    if (this._raf) cancelAnimationFrame(this._raf);\n    if (this._introTimeout) clearTimeout(this._introTimeout);\n    if (this._resize) window.removeEventListener('resize', this._resize);\n    if (this._onScroll) window.removeEventListener('scroll', this._onScroll);\n    this.disposeThree();\n  }\n\n  disposeThree() {\n    if (this._three && this._three.renderer) {\n      try { this._three.renderer.dispose(); this._three.renderer.forceContextLoss(); } catch (e) {}\n      const el = this._three.renderer.domElement;\n      if (el && el.parentNode) el.parentNode.removeChild(el);\n      this._three = null;\n    }\n  }\n\n  initNav() {\n    const nav = document.getElementById('fd-nav');\n    this._onScroll = () => {\n      if (!nav) return;\n      const s = window.scrollY > 40;\n      nav.style.background = s ? 'rgba(8,31,58,.92)' : 'rgba(8,31,58,.72)';\n      nav.style.boxShadow = s ? '0 8px 30px rgba(0,0,0,.3)' : 'none';\n    };\n    window.addEventListener('scroll', this._onScroll, { passive: true });\n  }\n\n  async runIntro() {\n    const container = document.getElementById('fd-earth');\n    if (!container) { this.finishIntro(true); return; }\n\n    \/\/ Bail to the site if the 3D libs\/texture don't arrive in time.\n    this._introTimeout = setTimeout(() => { if (!this._zoomDone && !this._skipped) this.finishIntro(true); }, 9000);\n\n    let THREE;\n    try {\n      THREE = await import('https:\/\/unpkg.com\/three@0.160.0\/build\/three.module.js');\n    } catch (e) {\n      this.finishIntro(true); return;\n    }\n    if (this._skipped) return;\n\n    const EARTH_RADIUS = 225;\n    const AUSTIN = { lat: 30.2672, lon: -97.7431 };\n    const START_DISTANCE = 1000;\n    const END_DISTANCE = 322;\n    const DUR = 6000;\n    const HUD_AT = 0.38;     \/\/ bring \"Austin, Texas\" in earlier\n    const FADE_START = 0.64; \/\/ begin dissolving the whole scene while still descending\n    const FADE_END = 0.8;    \/\/ fully gone by 80%\n\n    const scene = new THREE.Scene();\n    scene.fog = new THREE.FogExp2(0x02060d, 0.0007);\n    const camera = new THREE.PerspectiveCamera(42, window.innerWidth \/ window.innerHeight, 0.1, 6000);\n    scene.add(camera);\n    scene.add(new THREE.AmbientLight(0xffffff, 1.15));\n    const sun = new THREE.DirectionalLight(0xffffff, 2.2);\n    sun.position.set(-500, 380, 620);\n    scene.add(sun);\n\n    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });\n    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));\n    renderer.setSize(window.innerWidth, window.innerHeight);\n    container.appendChild(renderer.domElement);\n    this._three = { renderer, scene };\n\n    \/\/ stars\n    const sPos = [];\n    for (let i = 0; i < 1500; i++) {\n      const radius = 1400 + Math.random() * 1300;\n      const theta = Math.random() * Math.PI * 2;\n      const phi = Math.acos(2 * Math.random() - 1);\n      sPos.push(radius * Math.sin(phi) * Math.cos(theta), radius * Math.sin(phi) * Math.sin(theta), radius * Math.cos(phi));\n    }\n    const sGeo = new THREE.BufferGeometry();\n    sGeo.setAttribute('position', new THREE.Float32BufferAttribute(sPos, 3));\n    scene.add(new THREE.Points(sGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 2, sizeAttenuation: true })));\n\n    const earthGroup = new THREE.Group();\n    earthGroup.rotation.y = THREE.MathUtils.degToRad(92);\n    earthGroup.rotation.x = THREE.MathUtils.degToRad(-6);\n    scene.add(earthGroup);\n\n    const latLonToVec3 = (lat, lon, r) => {\n      const phi = THREE.MathUtils.degToRad(90 - lat);\n      const theta = THREE.MathUtils.degToRad(lon + 180);\n      return new THREE.Vector3(-r * Math.sin(phi) * Math.cos(theta), r * Math.cos(phi), r * Math.sin(phi) * Math.sin(theta));\n    };\n\n    let marker;\n    const buildSurface = (texture) => {\n      const geo = new THREE.SphereGeometry(EARTH_RADIUS, 96, 96);\n      let mat;\n      if (texture) {\n        texture.colorSpace = THREE.SRGBColorSpace;\n        texture.anisotropy = renderer.capabilities.getMaxAnisotropy();\n        mat = new THREE.MeshPhongMaterial({ map: texture, shininess: 8 });\n      } else {\n        mat = new THREE.MeshPhongMaterial({ color: 0x1d6f9c, shininess: 8 });\n      }\n      earthGroup.add(new THREE.Mesh(geo, mat));\n      \/\/ atmosphere\n      earthGroup.add(new THREE.Mesh(\n        new THREE.SphereGeometry(EARTH_RADIUS * 1.014, 96, 96),\n        new THREE.MeshBasicMaterial({ color: 0x7dd3fc, transparent: true, opacity: 0.16, side: THREE.BackSide })\n      ));\n      \/\/ Austin marker + ring\n      const surf = latLonToVec3(AUSTIN.lat, AUSTIN.lon, EARTH_RADIUS + 4);\n      marker = new THREE.Mesh(new THREE.SphereGeometry(5.5, 24, 24), new THREE.MeshBasicMaterial({ color: 0xf7c95f }));\n      marker.position.copy(surf);\n      earthGroup.add(marker);\n      const ring = new THREE.Mesh(\n        new THREE.RingGeometry(9, 14, 48),\n        new THREE.MeshBasicMaterial({ color: 0xf7c95f, transparent: true, opacity: 0.85, side: THREE.DoubleSide })\n      );\n      ring.position.copy(surf.clone().multiplyScalar(1.003));\n      ring.lookAt(surf.clone().multiplyScalar(2));\n      earthGroup.add(ring);\n\n      const loading = document.getElementById('fd-loading');\n      if (loading) loading.style.display = 'none';\n      this._animStart = performance.now();\n    };\n\n    new THREE.TextureLoader().load(\n      'https:\/\/threejs.org\/examples\/textures\/planets\/earth_atmos_2048.jpg',\n      (tex) => { if (!this._skipped) buildSurface(tex); },\n      undefined,\n      () => { if (!this._skipped) buildSurface(null); } \/\/ texture failed -> flat blue earth, keep going\n    );\n\n    const ease = (t) => (t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) \/ 2);\n    this._resize = () => {\n      camera.aspect = window.innerWidth \/ window.innerHeight;\n      camera.updateProjectionMatrix();\n      renderer.setSize(window.innerWidth, window.innerHeight);\n    };\n    window.addEventListener('resize', this._resize);\n\n    const tmpDir = new THREE.Vector3(), tmpStart = new THREE.Vector3(), tmpEnd = new THREE.Vector3(), look = new THREE.Vector3();\n    const offset = new THREE.Vector3(-18, 12, 10);\n    const loop = (now) => {\n      if (this._skipped) return;\n      if (this._animStart) {\n        const rawT = Math.min((now - this._animStart) \/ DUR, 1);\n        const e = ease(rawT); \/\/ keep descending the entire time — never freeze\n        const austin = earthGroup.localToWorld(latLonToVec3(AUSTIN.lat, AUSTIN.lon, EARTH_RADIUS).clone());\n        tmpDir.copy(austin).normalize();\n        tmpStart.copy(tmpDir).multiplyScalar(START_DISTANCE).add(offset);\n        tmpEnd.copy(tmpDir).multiplyScalar(END_DISTANCE);\n        camera.position.lerpVectors(tmpStart, tmpEnd, e);\n        look.copy(austin).multiplyScalar(0.92);\n        camera.lookAt(look);\n        if (marker) marker.scale.setScalar(1 + Math.sin(now * 0.006) * 0.24);\n        renderer.render(scene, camera);\n        if (rawT >= HUD_AT && !this._hudShown) {\n          this._hudShown = true;\n          if (this._introTimeout) { clearTimeout(this._introTimeout); this._introTimeout = null; }\n          const hud = document.getElementById('fd-hud');\n          if (hud) hud.style.animation = 'fd-fadeup .6s ease forwards';\n        }\n        if (rawT >= FADE_START) {\n          const f = Math.min((rawT - FADE_START) \/ (FADE_END - FADE_START), 1);\n          const intro = document.getElementById('fd-intro');\n          if (intro) intro.style.opacity = String(1 - f);\n        }\n        if (rawT >= FADE_END && !this._zoomDone) { this._zoomDone = true; this.finishIntro(true); return; }\n      } else {\n        renderer.render(scene, camera);\n      }\n      this._raf = requestAnimationFrame(loop);\n    };\n    this._raf = requestAnimationFrame(loop);\n  }\n\n  finishIntro(instant) {\n    const overlay = document.getElementById('fd-intro');\n    if (overlay) {\n      if (instant) {\n        overlay.style.display = 'none';\n      } else {\n        overlay.style.transition = 'opacity .8s ease';\n        overlay.style.opacity = '0';\n        setTimeout(() => { overlay.style.display = 'none'; if (this._raf) cancelAnimationFrame(this._raf); this.disposeThree(); }, 850);\n      }\n    }\n    if (this._introTimeout) { clearTimeout(this._introTimeout); this._introTimeout = null; }\n    if (this._resize) { window.removeEventListener('resize', this._resize); this._resize = null; }\n    if (instant) { if (this._raf) cancelAnimationFrame(this._raf); this.disposeThree(); }\n  }\n\n  skipIntro() {\n    if (this._skipped) return;\n    this._skipped = true;\n    this.finishIntro(false);\n  }\n}\n<\/script>\n\n\n<\/body><\/html>"},"entry":"Fieldday Site.dc"}</script>
